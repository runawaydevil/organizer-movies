name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.8, 3.9, '3.10', 3.11]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        black --check --diff .

    - name: Run tests
      run: |
        python -m pytest tests/ -v --cov=services --cov=models --cov-report=xml || echo "No tests found"

    - name: Test imports and basic functionality
      run: |
        python -c "from version import VERSION; print(f'Version: {VERSION}')"
        python -c "from services.secure_config_manager import SecureConfigManager; print('SecureConfigManager imported successfully')"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . || true

    - name: Check dependencies for vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check || true

    - name: Check for hardcoded secrets
      run: |
        # Check for potential API keys or secrets
        if grep -r "sk-[a-zA-Z0-9]" . --exclude-dir=.git --exclude="*.md" --exclude="*.yml" --exclude="*.yaml"; then
          echo "⚠️ Potential API keys found in code"
          exit 1
        fi
        echo "✅ No hardcoded API keys found"

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: [test, security-scan]
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        cd scripts
        python build_release.py

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v3
      with:
        name: windows-release
        path: release/

  build-linux:
    name: Build Linux Package
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create source distribution
      run: |
        python setup.py sdist

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v3
      with:
        name: linux-source
        path: dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4

    - name: Download Windows artifacts
      uses: actions/download-artifact@v3
      with:
        name: windows-release
        path: windows-release/

    - name: Download Linux artifacts
      uses: actions/download-artifact@v3
      with:
        name: linux-source
        path: linux-source/

    - name: Create release packages
      run: |
        # Create Windows ZIP
        cd windows-release
        zip -r ../MovieOrganizer-v${{ github.event.release.tag_name }}-Windows.zip .
        cd ..
        
        # Create checksums
        sha256sum MovieOrganizer-v${{ github.event.release.tag_name }}-Windows.zip > checksums.txt
        sha256sum linux-source/*.tar.gz >> checksums.txt

    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./MovieOrganizer-v${{ github.event.release.tag_name }}-Windows.zip
        asset_name: MovieOrganizer-v${{ github.event.release.tag_name }}-Windows.zip
        asset_content_type: application/zip

    - name: Upload checksums
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./checksums.txt
        asset_name: checksums.txt
        asset_content_type: text/plain